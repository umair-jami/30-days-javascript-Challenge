<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Expanding Cards</title>
  </head>
  <body>
    <!-- container starts -->
    <div class="container">
      <div class="card active">
        <img
          src="./images/exploreTheWorld.jpg"
          alt="Stunning view of the world"
        />
        <h3>Explore the World</h3>
      </div>
      <div class="card">
        <img src="./images/wildForest.jpg" alt="Majestic wild forest    " />
        <h3>Wild Forest</h3>
      </div>
      <div class="card">
        <img
          src="./images/sunnyBeach.jpg"
          alt="Sunny beach with clear blue water"
        />
        <h3>Sunny Beach</h3>
      </div>
      <div class="card">
        <img
          src="./images/cityOnWinter.jpg"
          alt="City in winter with snow-covered buildings"
        />
        <h3>City in Winter</h3>
      </div>
      <div class="card">
        <img
          src="./images/cloudMountain.jpg"
          alt="Majestic mountain covered in clouds"
        />
        <h3>Cloud Mountain</h3>
      </div>
    </div>
    <!-- container ends -->
    <script src="script.js"></script>
  </body>
</html>
